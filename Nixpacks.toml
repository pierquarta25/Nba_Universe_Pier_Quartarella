[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.pdo", "php84Extensions.tokenizer", "php84Extensions.fileinfo", "php84Extensions.openssl", "composer"]

[phases.build]
cmds = ["composer install --optimize-autoloader --no-interaction"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"